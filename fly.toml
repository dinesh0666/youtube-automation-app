# Fly.io configuration for n8n
app = "darkfiles-n8n"
primary_region = "sin"  # Singapore (closest to India)

[build]
  dockerfile = "fly-deploy/Dockerfile"

[env]
  N8N_HOST = "0.0.0.0"
  N8N_PORT = "8080"
  N8N_PROTOCOL = "https"
  NODE_ENV = "production"
  GENERIC_TIMEZONE = "Asia/Kolkata"
  N8N_METRICS = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Persistent volume for n8n data
[mounts]
  source = "n8n_data"
  destination = "/home/node/.n8n"
  initial_size = "3gb"
